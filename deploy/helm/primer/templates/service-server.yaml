apiVersion: v1
kind: Service
metadata:
  name: {{ include "primer.fullname" . }}-server
  labels:
    {{- include "primer.labels" . | nindent 4 }}
    {{- include "primer.server.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.server.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "primer.server.selectorLabels" . | nindent 4 }}
