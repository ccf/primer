<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Primer Mark: Isometric cube with translucent faces, thin edges, vertex nodes -->
  <!-- Top face -->
  <path d="M32 8 L56 20 L32 32 L8 20 Z" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1" stroke-linejoin="round"/>
  <!-- Left face -->
  <path d="M8 20 L32 32 L32 56 L8 44 Z" fill="#6366F1" opacity="0.35" stroke="#6366F1" stroke-width="1" stroke-linejoin="round"/>
  <!-- Right face -->
  <path d="M32 32 L56 20 L56 44 L32 56 Z" fill="#6366F1" opacity="0.55" stroke="#6366F1" stroke-width="1" stroke-linejoin="round"/>
  <!-- Hidden back edge -->
  <line x1="8" y1="20" x2="8" y2="44" stroke="#6366F1" stroke-width="0.75" opacity="0.2" stroke-dasharray="2,2"/>
  <!-- Vertex connection points -->
  <circle cx="32" cy="8" r="2.5" fill="#6366F1"/>
  <circle cx="56" cy="20" r="2.5" fill="#6366F1" opacity="0.8"/>
  <circle cx="8" cy="20" r="2.5" fill="#6366F1" opacity="0.5"/>
  <circle cx="32" cy="32" r="2.5" fill="#6366F1" opacity="0.9"/>
  <circle cx="32" cy="56" r="2.5" fill="#6366F1"/>
  <circle cx="56" cy="44" r="2.5" fill="#6366F1" opacity="0.7"/>
  <circle cx="8" cy="44" r="2.5" fill="#6366F1" opacity="0.4"/>
</svg>
